<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Second Screen Subtitles</title>
  <link rel="icon" type="image/png" href="icon.png" sizes="32x32">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <div id="MainLabel">Upload a .SRT file to get started!</div>

  <details id="menu">
  <summary>Menu (H to Hide)</summary>
  <div id="controls">
    <div id="tabs">
      <button class="tab active" data-tab="media">Media</button>
      <button class="tab" data-tab="text">Text</button>
      <button class="tab" data-tab="background">Background</button>
      <button class="tab" data-tab="themes">Themes</button>
    </div>
  
  <!-- MARK: Media -->
    <div class="tab-content" id="tab-media">
      <div class="setting">
          SRT File<br>
          <span id="srtTitle">(None currently loaded)</span>
          <button id="fileUploadButton" type="button">Choose File</button>
          <input id="SRTfileInput" type="file" accept=".srt" hidden>
      </div>
      
      <div class="setting">
        Playback
        <div class="inline-control">
          <button id="playBtn">Play</button>
          <button id="pauseBtn">Pause</button>
          <button id="resetBtn">Reset</button>
        </div>
        <span id="timeStamp">00:00:00</span>
      </div>

      <div class="setting">
        Calibration
        <div id="progressBar" class="progress-bar"></div>
        
        <div id="playback-controls">
          <button id="rewindFast">&lt;&lt;</button>
          <button id="rewindSlow">&lt;</button>
          <button id="forwardSlow">&gt;</button>
          <button id="forwardFast">&gt;&gt;</button>
        </div>
      </div>
    </div>

  <!-- MARK: Text -->
    <div class="tab-content" id="tab-text" style="display:none;">
      <div class="setting">
        Sample Text
        <input id="textInput" type="text" value="" />
      </div>

      <div class="setting">
        Font Size
        <div class="inline-control">
          <input id="sizeInput" type="range" min="12" max="96" value="48" style="flex:1;" />
          <input id="sizeBox" type="number" min="12" max="999" value="48" style="width:60px;" />
        </div>
      </div>

      <div class="setting">
        Font
        <select id="fontSelect"></select>
        <button id="fontUploadButton" type="button">Upload .TTF/.OTF</button>
        <input id="fontFileInput" type="file" accept=".ttf,.otf", hidden />
        <div id="textPreview" class="font-preview" contenteditable="true">
          Font Sample
        </div>
        <button id="applyFont">Apply</button>
      </div>

      <div class="setting">
        Text Color
        <input id="textColorInput" type="color" value="#ffffff" />
      </div>

      <div class="setting">
        Font Weight
        <div class="inline-control">
          <select id="weightInput" style="flex:1;">
            <!-- <option value="300">Light</option> -->
            <option value="400" selected>Normal</option>
            <option value="700">Bold</option>
          </select>
        </div>
      </div>
    </div>

  <!-- MARK: Background -->
    <div class="tab-content" id="tab-background" style="display:none;">
      <div class="setting">
        Background Color
        <input id="bgColorInput" type="color" value="#1e1e1e" />
      </div>

      <div class="setting">
        Background Image
        <input id="bgImageInput" type="file" accept="image/*" />
      </div>

      <div class="setting">
        Image Mode
        <select id="bgImageMode">
          <option value="stretch">Stretch</option>
          <option value="tile">Tile</option>
        </select>
      </div>

      <button id="clearBgImage">Clear Image</button>
    </div>

  <!-- MARK: Themes -->
    <div class="tab-content" id="tab-themes" style="display:none;">
      <div class="setting">
        Theme Name
        <input id="themeNameInput" type="text" placeholder="My Theme" />
      </div>

      <button id="saveThemeBtn">Save Theme</button>

      <hr />

      <div id="themeList"></div>

      <hr />

      <button id="resetThemeBtn">Default</button>

    </div>

  </div>
  </details>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
